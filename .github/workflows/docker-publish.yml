name: Build, Test, and Push to GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Stable local tag used during the build-and-test phase
  LOCAL_IMAGE: nopaystation-scripts-container:ci-test

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Build the image locally (no push) so tests can run against it.
      # `load: true` loads the image into the local Docker daemon.
      # `push: false` ensures nothing reaches the registry until tests pass.
      # ------------------------------------------------------------------
      - name: Build image locally for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE }}

      # ------------------------------------------------------------------
      # Download the container-structure-test binary.
      # The binary is used rather than the gcr.io Docker image to avoid
      # Docker-in-Docker complexity and because the Docker image lags behind
      # releases.
      # ------------------------------------------------------------------
      - name: Download container-structure-test
        run: |
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      # ------------------------------------------------------------------
      # Run the test suite against the locally loaded image.
      # If any test fails the job stops here and the push step never runs.
      # ------------------------------------------------------------------
      - name: Run container structure tests
        run: |
          container-structure-test test \
            --image ${{ env.LOCAL_IMAGE }} \
            --config tests/container-structure-test.yml

      # ------------------------------------------------------------------
      # Tests passed. Log in and push the final tagged image to GHCR.
      # The build is re-run here; Docker layer caching on the runner makes
      # this fast because all layers are already present from the first build.
      # ------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
