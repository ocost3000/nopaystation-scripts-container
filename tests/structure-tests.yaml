    exitCode: 0

  - name: "nps_psp.sh executable"
    command: "test"
    args: ["-x", "/scripts/nps_psp.sh"]
    exitCode: 0

  - name: "nps_bundle.sh executable"
    command: "test"
    args: ["-x", "/scripts/nps_bundle.sh"]
    exitCode: 0

  - name: "nps_region.sh executable"
    command: "test"
    args: ["-x", "/scripts/nps_region.sh"]
    exitCode: 0

  - name: "pyNPU.py executable"
    command: "test"
    args: ["-x", "/scripts/pyNPU.py"]
    exitCode: 0

  # ── Script invocations (no-args → argument validation, not network) ──────
  - name: "nps_tsv.sh no args exits non-zero"
    command: "nps_tsv.sh"
    args: []
    exitCode: 1

  - name: "nps_game.sh no args exits non-zero"
    command: "nps_game.sh"
    args: []
    exitCode: 1

  - name: "nps_update.sh no args exits non-zero"
    command: "nps_update.sh"
    args: []
    exitCode: 1

  - name: "nps_dlc.sh no args exits non-zero"
    command: "nps_dlc.sh"
    args: []
